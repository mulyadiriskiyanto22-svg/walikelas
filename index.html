       <input id="s-ayah" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-400">

       <input id="s-ibu" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-400">
      </div>
      <div>
       <label class="block text-xs font-medium text-gray-600 mb-1" for="s-pkayah">Pekerjaan Ayah</label>
       <input id="s-pkayah" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-400">
      </div>

       <input id="s-pkibu" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-400">
      </div>
      <div>
       <label class="block text-xs font-medium text-gray-600 mb-1" for="s-alamat">Alamat</label>
       <input id="s-alamat" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-400">
      </div>

       <input id="s-hp" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-400">

      </div>

  <script>
   // ============================================================
   // 1. DATA SDK & STATE
   // ============================================================
   let allData = [];
   const CIRC = 150.8;

   function navigate(view) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + view).classList.add('active');
   }

   document.getElementById('btn-home').addEventListener('click', () => navigate('dashboard'));

   const handler = {
    onDataChanged(data) {
     allData = data;
     renderDashboard();
     renderSiswaTable();
     populateSekolahForm();
    }
   };

   async function initApp() {
    const r = await window.dataSdk.init(handler);
    if (!r.isOk) console.error('SDK init failed');
   }
   initApp();

   function getSekolah() {
    return allData.find(d => d.type === 'sekolah');
   }

   function getSiswa() {
    return allData.filter(d => d.type === 'siswa');
   }

   // ============================================================
   // 2. DASHBOARD
   // ============================================================
   function renderDashboard() {
    const s = getSekolah();
    const guru = s ? s.guru_kelas : '-';
    document.getElementById('dashboard-guru').textContent = guru || '-';

    const fields = ['nama_sekolah', 'npsn', 'alamat', 'email', 'kepala_sekolah', 'nip_kepsek', 'guru_kelas', 'nip_guru', 'kelas', 'fase', 'tahun_ajaran'];
    let filled = 0;
    if (s) fields.forEach(f => { if (s[f]) filled++; });
    const pct = Math.round((filled / fields.length) * 100);
    document.getElementById('prog-sekolah').style.strokeDashoffset = CIRC - (CIRC * pct / 100);
    document.getElementById('prog-sekolah-text').textContent = pct + '%';

    const siswa = getSiswa();
    const spct = siswa.length > 0 ? 100 : 0;
    document.getElementById('prog-siswa').style.strokeDashoffset = CIRC - (CIRC * spct / 100);
    document.getElementById('prog-siswa-text').textContent = spct + '%';
   }

   // ============================================================
   // 3. DATA SEKOLAH
   // ============================================================
   function populateSekolahForm() {
    const s = getSekolah();
    if (!s) return;
    document.getElementById('f-nama-sekolah').value = s.nama_sekolah || '';
    document.getElementById('f-npsn').value = s.npsn || '';
    document.getElementById('f-alamat').value = s.alamat || '';
    document.getElementById('f-email').value = s.email || '';
    document.getElementById('f-kepsek').value = s.kepala_sekolah || '';
    document.getElementById('f-nip-kepsek').value = s.nip_kepsek || '';
    document.getElementById('f-guru').value = s.guru_kelas || '';
    document.getElementById('f-nip-guru').value = s.nip_guru || '';
    document.getElementById('f-kelas').value = s.kelas || '';
    document.getElementById('f-fase').value = s.fase || '';
    document.getElementById('f-tahun').value = s.tahun_ajaran || '';
   }

   document.getElementById('form-sekolah').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-save-sekolah');
    btn.disabled = true;
    btn.textContent = 'Menyimpan...';
    const data = {
     type: 'sekolah',
     nama_sekolah: document.getElementById('f-nama-sekolah').value,
     npsn: document.getElementById('f-npsn').value,
     alamat: document.getElementById('f-alamat').value,
     email: document.getElementById('f-email').value,
     kepala_sekolah: document.getElementById('f-kepsek').value,
     nip_kepsek: document.getElementById('f-nip-kepsek').value,
     guru_kelas: document.getElementById('f-guru').value,
     nip_guru: document.getElementById('f-nip-guru').value,
     kelas: document.getElementById('f-kelas').value,
     fase: document.getElementById('f-fase').value,
     tahun_ajaran: document.getElementById('f-tahun').value
    };
    const existing = getSekolah();
    let result;
    if (existing) {
     result = await window.dataSdk.update({ ...existing,
      ...data });
    } else {
     result = await window.dataSdk.create(data);
    }
    btn.disabled = false;
    btn.innerHTML = '<i data-lucide="save" style="width:16px;height:16px"></i> Simpan';
    lucide.createIcons();
    const msg = document.getElementById('save-sekolah-msg');
    if (result.isOk) {
     msg.classList.remove('hidden');
     setTimeout(() => msg.classList.add('hidden'), 2000);
    }
   });

   // ============================================================
   // 4. DATA SISWA
   // ============================================================
   function renderSiswaTable() {
    const siswa = getSiswa();
    const tbody = document.getElementById('siswa-tbody');
    const empty = document.getElementById('empty-siswa');
    empty.style.display = siswa.length ? 'none' : 'block';
    tbody.innerHTML = '';
    siswa.forEach((s, i) => {
     const tr = document.createElement('tr');
     tr.className = 'border-t border-gray-100';
     tr.innerHTML =
      `<td class="px-2 py-2 text-center">${i+1}</td><td class="px-2 py-2">${s.no_induk||''}</td><td class="px-2 py-2">${s.nisn||''}</td><td class="px-2 py-2 font-medium">${s.nama||''}</td><td class="px-2 py-2">${s.jenis_kelamin||''}</td><td class="px-2 py-2">${s.tempat_tanggal_lahir||''}</td><td class="px-2 py-2">${s.nama_ayah||''}</td><td class="px-2 py-2">${s.nama_ibu||''}</td><td class="px-2 py-2"><button class="text-red-500 hover:text-red-700" onclick="deleteSiswa('${s.__backendId}')"><i data-lucide="trash-2" style="width:14px;height:14px"></i></button></td>`;
     tbody.appendChild(tr);
    });
    lucide.createIcons();
   }

   async function deleteSiswa(id) {
    const rec = allData.find(d => d.__backendId === id);
    if (rec) await window.dataSdk.delete(rec);
   }

   function showAddSiswa() {
    document.getElementById('modal-siswa').classList.remove('hidden');
   }

   function closeModal() {
    document.getElementById('modal-siswa').classList.add('hidden');
    document.getElementById('form-siswa').reset();
   }

   document.getElementById('form-siswa').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (allData.length >= 999) {
     document.getElementById('upload-status').textContent = 'Batas 999 data tercapai!';
     document.getElementById('upload-status').classList.remove('hidden');
     return;
    }
    const data = {
     type: 'siswa',
     no_induk: document.getElementById('s-noinduk').value,
     nisn: document.getElementById('s-nisn').value,
     nama: document.getElementById('s-nama').value,
     jenis_kelamin: document.getElementById('s-jk').value,
     tempat_tanggal_lahir: document.getElementById('s-ttl').value,
     nama_ayah: document.getElementById('s-ayah').value,
     nama_ibu: document.getElementById('s-ibu').value,
     pekerjaan_ayah: document.getElementById('s-pkayah').value,
     pekerjaan_ibu: document.getElementById('s-pkibu').value,
     alamat_siswa: document.getElementById('s-alamat').value,
     no_hp: document.getElementById('s-hp').value
    };
    await window.dataSdk.create(data);
    closeModal();
   });

   // ============================================================
   // 5. DOWNLOAD TEMPLATE EXCEL (FIX)
   // ============================================================
   function downloadTemplate() {
    try {
     // Buat workbook baru
     const wb = XLSX.utils.book_new();

     // Data header (1 baris kosong untuk contoh)
     const headers = [
      'No Induk',
      'NISN',
      'Nama',
      'Jenis Kelamin',
      'Tempat Tanggal Lahir',
      'Nama Ayah',
      'Nama Ibu',
      'Pekerjaan Ayah',
      'Pekerjaan Ibu',
      'Alamat',
      'No HP'
     ];

     // Data contoh (1 siswa sebagai panduan)
     const contoh = [
      '2025001',
      '1234567890',
      'Ahmad Zainuddin',
      'Laki-laki',
      'Surabaya, 15 Januari 2015',
      'H. Slamet Riyadi',
      'Hj. Siti Aminah',
      'Wiraswasta',
      'Ibu Rumah Tangga',
      'Jl. Raya Gunungsekar No. 45, Sampang',
      '081234567890'
     ];

     // Gabungkan header + contoh
     const data = [
      headers,
      contoh,
      // baris kosong untuk diisi user
      ['', '', '', '', '', '', '', '', '', '', '']
     ];

     // Konversi ke sheet
     const ws = XLSX.utils.aoa_to_sheet(data);

     // Set lebar kolom agar nyaman
     ws['!cols'] = [
      { wch: 15 },
      { wch: 15 },
      { wch: 25 },
      { wch: 15 },
      { wch: 25 },
      { wch: 25 },
      { wch: 25 },
      { wch: 20 },
      { wch: 20 },
      { wch: 35 },
      { wch: 18 }
     ];

     // Tambahkan sheet ke workbook
     XLSX.utils.book_append_sheet(wb, ws, 'Template Siswa');

     // Generate file
     const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });

     // Buat blob dan download
     const blob = new Blob([wbout], { type: 'application/octet-stream' });
     const link = document.createElement('a');
     link.href = URL.createObjectURL(blob);
     link.download = 'Template_Data_Siswa.xlsx';
     document.body.appendChild(link);
     link.click();
     document.body.removeChild(link);
     URL.revokeObjectURL(link.href);

     // Tampilkan status sukses
     const status = document.getElementById('upload-status');
     status.textContent = '✓ Template berhasil didownload!';
     status.className = 'text-sm text-green-600 mb-2';
     status.classList.remove('hidden');
     setTimeout(() => { status.classList.add('hidden'); }, 4000);

    } catch (err) {
     console.error('Error download template:', err);
     const status = document.getElementById('upload-status');
     status.textContent = '❌ Gagal download template. Silakan coba lagi.';
     status.className = 'text-sm text-red-600 mb-2';
     status.classList.remove('hidden');
    }
   }

   // ============================================================
   // 6. UPLOAD FILE EXCEL
   // ============================================================
   document.getElementById('file-upload').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    // Validasi ekstensi
    const validExt = ['.xlsx', '.xls', '.csv'];
    const ext = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
    if (!validExt.includes(ext)) {
     const status = document.getElementById('upload-status');
     status.textContent = '❌ Format file tidak didukung. Gunakan .xlsx, .xls, atau .csv';
     status.className = 'text-sm text-red-600 mb-2';
     status.classList.remove('hidden');
     e.target.value = '';
     return;
    }

    const status = document.getElementById('upload-status');
    status.textContent = '⏳ Memproses file...';
    status.className = 'text-sm text-blue-600 mb-2';
    status.classList.remove('hidden');

    const reader = new FileReader();
    reader.onload = async (ev) => {
     try {
      const wb = XLSX.read(ev.target.result, { type: 'array' });
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

      if (rows.length === 0) {
       status.textContent = '⚠️ File kosong. Tidak ada data yang diupload.';
       status.className = 'text-sm text-yellow-600 mb-2';
       e.target.value = '';
       return;
      }

      let count = 0;
      let errorCount = 0;

      for (const row of rows) {
       if (allData.length >= 999) break;

       // Cek apakah ada data minimal nama atau NISN
       const nama = String(row['Nama'] || row['nama'] || row['NAMA'] || '');
       const nisn = String(row['NISN'] || row['nisn'] || '');
       const noInduk = String(row['No Induk'] || row['No.Induk'] || row['no_induk'] || '');

       if (!nama && !nisn && !noInduk) {
        errorCount++;
        continue;
       }

       await window.dataSdk.create({
        type: 'siswa',
        no_induk: noInduk,
        nisn: nisn,
        nama: nama,
        jenis_kelamin: String(row['Jenis Kelamin'] || row['JK'] || row['jenis_kelamin'] || ''),
        tempat_tanggal_lahir: String(row['Tempat Tanggal Lahir'] || row['TTL'] || row['tempat_tanggal_lahir'] || ''),
        nama_ayah: String(row['Nama Ayah'] || row['nama_ayah'] || ''),
        nama_ibu: String(row['Nama Ibu'] || row['nama_ibu'] || ''),
        pekerjaan_ayah: String(row['Pekerjaan Ayah'] || row['pekerjaan_ayah'] || ''),
        pekerjaan_ibu: String(row['Pekerjaan Ibu'] || row['pekerjaan_ibu'] || ''),
        alamat_siswa: String(row['Alamat'] || row['alamat'] || row['alamat_siswa'] || ''),
        no_hp: String(row['No HP'] || row['No.HP'] || row['no_hp'] || '')
       });
       count++;
      }

      if (count === 0 && errorCount > 0) {
       status.textContent = '⚠️ Tidak ada data valid. Pastikan format header sesuai template.';
       status.className = 'text-sm text-yellow-600 mb-2';
      } else {
       status.textContent = `✅ ${count} siswa berhasil diupload${errorCount > 0 ? `, ${errorCount} baris dilewati (data kosong)` : ''}`;
       status.className = 'text-sm text-green-600 mb-2';
      }
     } catch (err) {
      console.error('Upload error:', err);
      status.textContent = '❌ Gagal memproses file. Pastikan format benar.';
      status.className = 'text-sm text-red-600 mb-2';
     }
     e.target.value = '';
     setTimeout(() => { status.classList.add('hidden'); }, 6000);
    };

    reader.onerror = () => {
     const status = document.getElementById('upload-status');
     status.textContent = '❌ Gagal membaca file.';
     status.className = 'text-sm text-red-600 mb-2';
     status.classList.remove('hidden');
     e.target.value = '';
    };

    reader.readAsArrayBuffer(file);
   });

   // ============================================================
   // 7. INISIALISASI IKON
   // ============================================================
   lucide.createIcons();
  </script>
